# =============================================
#   MiniCloud API — Application Configuration
# =============================================

server.port=8080
server.tomcat.threads.max=20
server.servlet.context-path=/api/v1

# ── Database Configuration ─────────────────────────────────────
# Default: H2 (File-based)
spring.datasource.url=jdbc:h2:file:./minicloud-data/db/miniclouddb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Production Template: PostgreSQL (Uncomment to use)
# spring.datasource.url=jdbc:postgresql://localhost:5432/minicloud
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# ddl-auto=validate: Flyway manages schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway — schema versioning
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false

# File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Disable JMX to reduce memory
spring.jmx.enabled=false

# Storage base path
minicloud.storage.base-path=./minicloud-data/storage

# Lambda tmp directory
minicloud.lambda.tmp-dir=./minicloud-data/lambda-tmp

# Auto-scaling configuration
minicloud.autoscaling.scale-up-threshold=80.0
minicloud.autoscaling.scale-down-threshold=30.0
minicloud.autoscaling.scale-down-cooldown-samples=10
minicloud.autoscaling.min-replicas=1
minicloud.autoscaling.max-replicas=10
minicloud.autoscaling.eval-interval-ms=60000

# JWT Configuration (secret must be >= 32 characters for HS256)
minicloud.jwt.secret=MiniCloud-SecretKey-2026-SuperSecure-JWT-Token
minicloud.jwt.expiry-ms=3600000

# H2 TCP Server Configuration (for external JDBC access)
minicloud.h2.tcp.enabled=true
minicloud.h2.tcp.port=9092
minicloud.h2.tcp.allow-others=true

# System Tray Configuration (for web service mode)
minicloud.system-tray.enabled=true

# Logging Configuration
logging.file.name=./minicloud-data/logs/app.log
logging.level.root=INFO
logging.level.com.minicloud=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.max-size=10MB
logging.file.max-history=30

# SpringDoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha

# Cache (Caffeine — no Redis required)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# Disable Eureka/Cloud discovery (not used in monolith)
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable Config Server import (not used in monolith)
spring.config.import=optional:file:./config/

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.scheduling.pool.size=2

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator

# Graceful Shutdown Configuration
server.shutdown=graceful
server.shutdown.grace-period=30s
spring.lifecycle.timeout-per-shutdown-phase=30s
