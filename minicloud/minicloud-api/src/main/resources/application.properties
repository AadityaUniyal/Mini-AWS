# =============================================
#   MiniCloud API — Application Configuration
#   Database: H2 in MySQL Compatibility Mode
#   Frontend: Java Swing Desktop Panel ONLY
# =============================================

server.port=8080
server.tomcat.threads.max=20

# ── Database: MySQL Server ────────────────────────────────
# Fresh database setup - minicloud_fresh
spring.datasource.url=jdbc:mysql://localhost:3306/minicloud_fresh?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=minicloud
spring.datasource.password=minicloud123

# Disable H2 web console (not needed — Swing UI is the only frontend)
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway — schema versioning (MySQL-compatible scripts run under H2 MySQL mode)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false

# File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Disable JMX to reduce memory
spring.jmx.enabled=false

# Storage base path
minicloud.storage.base-path=C:/Users/HP/OneDrive/Desktop/aws/minicloud-data/storage

# Lambda tmp directory
minicloud.lambda.tmp-dir=C:/Users/HP/OneDrive/Desktop/aws/minicloud-data/lambda-tmp

# Auto-scaling configuration
minicloud.autoscaling.scale-up-threshold=80.0
minicloud.autoscaling.scale-down-threshold=30.0
minicloud.autoscaling.scale-down-cooldown-samples=10
minicloud.autoscaling.min-replicas=1
minicloud.autoscaling.max-replicas=10
minicloud.autoscaling.eval-interval-ms=60000

# JWT Configuration (secret must be >= 32 characters for HS256)
minicloud.jwt.secret=MiniCloud-SecretKey-2026-SuperSecure-JWT-Token
minicloud.jwt.expiry-ms=3600000

# H2 TCP Server — DISABLED (not needed in desktop-only mode)
minicloud.h2.tcp.enabled=false

# System Tray — disabled in desktop mode (Swing window is the UI)
minicloud.system-tray.enabled=false

# Logging Configuration
logging.file.name=C:/Users/HP/OneDrive/Desktop/aws/minicloud-data/logs/app.log
logging.level.root=WARN
logging.level.com.minicloud=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{28} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.max-size=10MB
logging.file.max-history=30

# SpringDoc / Swagger — DISABLED (no browser frontend)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Block static web content — Swing is the only frontend
spring.web.resources.add-mappings=false

# Cache (Caffeine — no Redis required)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# Disable Eureka/Cloud discovery (not used in monolith)
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable Config Server import
spring.config.import=optional:file:./config/

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.scheduling.pool.size=2

# Actuator — health check only (used by SwingLauncher to detect backend ready)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s
