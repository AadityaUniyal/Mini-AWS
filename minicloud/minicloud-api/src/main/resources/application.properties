# =============================================
#   MiniCloud API — Desktop Application Configuration
#   Database: MySQL ONLY (all schema in MySQL Workbench)
#   Frontend: Java Swing Desktop Application ONLY
#   NO WEB SERVER - NO BROWSER - Pure Desktop Java
# =============================================

# ── MySQL Database Connection (ONLY connection config here) ────
spring.datasource.url=jdbc:mysql://localhost:3306/minicloud_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE

# ── JPA / Hibernate Configuration ────
# validate = Hibernate checks tables exist but does NOT create/modify them
# ALL schema changes must be done in MySQL Workbench ONLY
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Disable Web Application (NO HTTP SERVER) ────
spring.main.web-application-type=none

# ── Disable SQL Init (NO schema.sql or data.sql) ────
spring.sql.init.mode=never

# ── File Upload Limits (for S3-like storage) ────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=false

# ── Disable JMX to reduce memory ────
spring.jmx.enabled=false

# ── Storage Configuration ────
minicloud.storage.base-path=minicloud-data/storage
minicloud.lambda.tmp-dir=minicloud-data/lambda-tmp

# ── Auto-scaling Configuration ────
minicloud.autoscaling.scale-up-threshold=80.0
minicloud.autoscaling.scale-down-threshold=30.0
minicloud.autoscaling.scale-down-cooldown-samples=10
minicloud.autoscaling.min-replicas=1
minicloud.autoscaling.max-replicas=10
minicloud.autoscaling.eval-interval-ms=60000

# ── Logging Configuration ────
logging.file.name=minicloud-data/logs/app.log
logging.level.root=WARN
logging.level.com.minicloud=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{28} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.max-size=10MB
logging.file.max-history=30

# ── Cache Configuration (Caffeine - no Redis) ────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ── Async Thread Pool ────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.scheduling.pool.size=2

# ── Graceful Shutdown ────
spring.lifecycle.timeout-per-shutdown-phase=15s

# ── Force UTF-8 Encoding (Windows compatibility) ────
spring.mandatory-file-encoding=UTF-8
