# =============================================
#   MiniCloud API — Application Configuration
# =============================================

server.port=8080
server.tomcat.threads.max=20

# H2 File Database
spring.datasource.url=jdbc:h2:file:./minicloud-data/db/miniclouddb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Disable JMX to reduce memory
spring.jmx.enabled=false

# Storage base path
minicloud.storage.base-path=./minicloud-data/storage

# JWT Configuration (secret must be >= 32 characters for HS256)
minicloud.jwt.secret=MiniCloud-SecretKey-2026-SuperSecure-JWT-Token
minicloud.jwt.expiry-ms=3600000

# Logging
logging.level.com.minicloud=INFO
logging.file.name=./minicloud-data/logs/app.log
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# SpringDoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
